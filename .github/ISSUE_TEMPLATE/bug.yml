name: 网站问题 / Site bug
description: 报告页面、链接、媒体、搜索或移动端显示问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: input
    id: url
    attributes:
      label: 页面地址 / Page URL
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: 问题描述 / Description
      description: 请说明你看到了什么，以及预期应该是什么。
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 设备与浏览器 / Device and browser
      placeholder: macOS + Chrome, iPhone + Safari, etc.
